services:
  db:
    image: postgres:17.6
    env_file: .env
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT}:5432"
    networks:
      - jungle-net
    volumes:
      - db:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  migration:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "packages/database/dist/run-migrations.js"]
    networks:
      - jungle-net
    depends_on:
      db:
        condition: service_healthy
    env_file: .env

  payments:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "apps/payments/dist/src/main.js"]
    networks:
      - jungle-net
    depends_on:
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      remnawave:
        condition: service_started
    env_file: .env
    ports:
      - "127.0.0.1:${PAYMENTS_PORT}:${PAYMENTS_PORT}"
    restart: always

  remnawave:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "apps/remnawave/dist/main.js"]
    networks:
      - jungle-net
    depends_on:
      migration:
        condition: service_completed_successfully
    env_file: .env
    ports:
      - "127.0.0.1:${REMNAWAVE_PORT}:${REMNAWAVE_PORT}"
    restart: always

  referrals:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "apps/referrals/dist/main.js"]
    networks:
      - jungle-net
    depends_on:
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      remnawave:
        condition: service_started
    env_file: .env
    ports:
      - "127.0.0.1:${REFERRALS_PORT}:${REFERRALS_PORT}"
    restart: always

  broadcasts:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "apps/broadcasts/dist/main.js"]
    networks:
      - jungle-net
    depends_on:
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    env_file: .env
    ports:
      - "127.0.0.1:${BROADCASTS_PORT}:${BROADCASTS_PORT}"
    restart: always

  webhook:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "apps/webhook/dist/main.js"]
    networks:
      - jungle-net
    depends_on:
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      payments:
        condition: service_started
    env_file: .env
    ports:
      - "127.0.0.1:${WEBHOOK_PORT}:${WEBHOOK_PORT}"
    restart: always

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["apps/web/node_modules/.bin/serve", "apps/web/dist", "--single", "--listen", "tcp://0.0.0.0:${WEB_PORT:-7090}"]
    networks:
      - jungle-net
    ports:
      - "127.0.0.1:${WEB_PORT:-7090}:${WEB_PORT:-7090}"
    restart: always

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "apps/bot/dist/main.js"]
    networks:
      - jungle-net
    depends_on:
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      remnawave:
        condition: service_started
      payments:
        condition: service_started
      referrals:
        condition: service_started
      broadcasts:
        condition: service_started
    env_file: .env
    ports:
      - "127.0.0.1:${BOT_PORT:-7000}:${BOT_PORT:-7000}"
    restart: always


volumes:
  db:

networks:
  jungle-net:
    external: false