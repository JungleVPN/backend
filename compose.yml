x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  args:
    TURBO_CONCURRENCY: ${TURBO_CONCURRENCY:-2}
    # Vite vars — baked into the JS bundle at build time, must be passed here
    VITE_REMNAWAVE_URL: ${VITE_REMNAWAVE_URL}
    VITE_PAYMENTS_URL: ${VITE_PAYMENTS_URL}
    VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
    VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    VITE_SUBPAGE_CONFIG: ${VITE_SUBPAGE_CONFIG}
    VITE_TRIAL_PERIOD_IN_DAYS: ${VITE_TRIAL_PERIOD_IN_DAYS}
    VITE_ALLOWED_AMOUNTS: ${VITE_ALLOWED_AMOUNTS}
    VITE_ALLOWED_PERIODS: ${VITE_ALLOWED_PERIODS}

# Reusable healthcheck timing for NestJS services
x-nest-hc: &nest-hc
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 30s

services:
  db:
    image: postgres:17.6
    container_name: db
    env_file: .env
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT}:5432"
    networks:
      - jungle-net
    volumes:
      - db:/var/lib/postgresql/data
    restart: always
    healthcheck:
      # pg_isready only checks the socket; the psql SELECT 1 verifies auth is ready too
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB && psql -U $$POSTGRES_USER -d $$POSTGRES_DB -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 5

  migration:
    build:
      <<: *app-build
    command: ["node", "packages/database/dist/run-migrations.js"]
    networks:
      - jungle-net
    depends_on:
      db:
        condition: service_healthy
    env_file: .env

  remnawave:
    build:
      <<: *app-build
    container_name: remnawave
    command: ["node", "apps/remnawave/dist/main.js"]
    networks:
      - jungle-net
    depends_on:
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    env_file: .env
    ports:
      - "127.0.0.1:${REMNAWAVE_PORT}:${REMNAWAVE_PORT}"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:' + process.env.REMNAWAVE_PORT, r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      <<: *nest-hc

  payments:
    build:
      <<: *app-build
    container_name: payments
    command: ["node", "apps/payments/dist/src/main.js"]
    networks:
      - jungle-net
    depends_on:
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      remnawave:
        condition: service_healthy
    env_file: .env
    ports:
      - "127.0.0.1:${PAYMENTS_PORT}:${PAYMENTS_PORT}"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:' + process.env.PAYMENTS_PORT, r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      <<: *nest-hc

  referrals:
    build:
      <<: *app-build
    container_name: referrals
    command: ["node", "apps/referrals/dist/main.js"]
    networks:
      - jungle-net
    depends_on:
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      remnawave:
        condition: service_healthy
    env_file: .env
    ports:
      - "127.0.0.1:${REFERRALS_PORT}:${REFERRALS_PORT}"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:' + process.env.REFERRALS_PORT, r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      <<: *nest-hc

  broadcasts:
    build:
      <<: *app-build
    container_name: broadcasts
    command: ["node", "apps/broadcasts/dist/main.js"]
    networks:
      - jungle-net
    depends_on:
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    env_file: .env
    ports:
      - "127.0.0.1:${BROADCASTS_PORT}:${BROADCASTS_PORT}"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:' + process.env.BROADCASTS_PORT, r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      <<: *nest-hc

  webhook:
    build:
      <<: *app-build
    container_name: webhook
    command: ["node", "apps/webhook/dist/main.js"]
    networks:
      - jungle-net
    depends_on:
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      payments:
        condition: service_healthy
    env_file: .env
    ports:
      - "127.0.0.1:${WEBHOOK_PORT}:${WEBHOOK_PORT}"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:' + process.env.WEBHOOK_PORT, r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      <<: *nest-hc

  web:
    build:
      <<: *app-build
    container_name: web
    command: ["apps/web/node_modules/.bin/serve", "apps/web/dist", "--single", "--listen", "tcp://0.0.0.0:${WEB_PORT:-7080}"]
    networks:
      - jungle-net
    ports:
      - "127.0.0.1:${WEB_PORT:-7080}:${WEB_PORT:-7080}"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:${WEB_PORT:-7080}/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  tma:
    build:
      <<: *app-build
    container_name: tma
    command: ["apps/tma/node_modules/.bin/serve", "apps/tma/dist", "--single", "--listen", "tcp://0.0.0.0:${TMA_PORT:-7090}"]
    networks:
      - jungle-net
    ports:
      - "127.0.0.1:${TMA_PORT:-7090}:${TMA_PORT:-7090}"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:${TMA_PORT:-7090}/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  bot:
    build:
      <<: *app-build
    container_name: bot
    command: ["node", "apps/bot/dist/main.js"]
    networks:
      - jungle-net
    depends_on:
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      remnawave:
        condition: service_healthy
      payments:
        condition: service_healthy
      referrals:
        condition: service_healthy
      broadcasts:
        condition: service_healthy
    env_file: .env
    ports:
      - "127.0.0.1:${BOT_PORT:-7070}:${BOT_PORT:-7070}"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:' + (process.env.BOT_PORT || 7070), r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      <<: *nest-hc


volumes:
  db:

networks:
  jungle-net:
    external: true
